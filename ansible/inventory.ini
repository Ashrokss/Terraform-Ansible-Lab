# ============================================================================
# Ansible Inventory — Static
# ============================================================================
# NOTE: After 'terraform apply', replace the IP addresses below with the
#       actual PRIVATE IPs from the Terraform output.
#       Run: terraform output app_vm_private_ips
#
# Alternatively, copy the output of: terraform output ansible_inventory_content
# ============================================================================

[app_servers]
app-vm-1 ansible_host=10.0.1.10
app-vm-2 ansible_host=10.0.1.11
app-vm-3 ansible_host=10.0.1.12

[app_servers:vars]
ansible_user=azureuser
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
